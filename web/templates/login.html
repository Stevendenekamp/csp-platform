{% extends "layout.html" %}

{% block title %}Inloggen — CSP{% endblock %}

{% block extra_head %}
<style>
    .auth-wrap { max-width: 420px; margin: 4rem auto; }
    .auth-wrap .card { padding: 2rem; }
    .auth-wrap h2 { font-family: 'Raleway', sans-serif; font-size: 1.4rem; margin-bottom: 1.5rem; color: var(--navy-deep); }
    .auth-wrap .form-group input { display: block; }
    .auth-wrap .btn-submit { width: 100%; padding: .7rem; font-size: .95rem; text-align: center; }
    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: var(--text-muted); }
    .auth-footer a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="card">
        <h2>Inloggen</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="email">E-mailadres</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="password">Wachtwoord</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-submit">Inloggen</button>
        </form>

        <p class="auth-footer">
            Nog geen account? <a href="/register">Registreer hier</a>
        </p>
    </div>
</div>
{% endblock %}
