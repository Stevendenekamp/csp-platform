{% extends "layout.html" %}

{% block title %}Account aanmaken — CSP{% endblock %}

{% block extra_head %}
<style>
    .auth-wrap { max-width: 440px; margin: 4rem auto; }
    .auth-wrap .card { padding: 2rem; }
    .auth-wrap h2 { font-family: 'Raleway', sans-serif; font-size: 1.4rem; margin-bottom: 1.5rem; color: var(--navy-deep); }
    .auth-wrap .btn-submit { width: 100%; padding: .7rem; font-size: .95rem; text-align: center; }
    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: var(--text-muted); }
    .auth-footer a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="card">
        <h2>Account aanmaken</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register">
            <div class="form-group">
                <label for="username">Naam</label>
                <input type="text" id="username" name="username" required autofocus minlength="2" placeholder="Voornaam Achternaam / Bedrijfsnaam">
            </div>
            <div class="form-group">
                <label for="email">E-mailadres</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Wachtwoord</label>
                <input type="password" id="password" name="password" required minlength="8" placeholder="Minimaal 8 tekens">
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="password_confirm">Wachtwoord bevestigen</label>
                <input type="password" id="password_confirm" name="password_confirm" required minlength="8">
            </div>
            <button type="submit" class="btn btn-submit">Account aanmaken</button>
        </form>

        <p class="auth-footer">
            Al een account? <a href="/login">Inloggen</a>
        </p>
    </div>
</div>
{% endblock %}
