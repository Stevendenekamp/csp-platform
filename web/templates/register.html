{% extends "layout.html" %}

{% block title %}Account aanmaken{% endblock %}

{% block content %}
<div style="max-width: 440px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; color: #2c3e50;">Account aanmaken</h2>

        {% if error %}
        <div style="background:#ffeaea;color:#c0392b;padding:0.75rem 1rem;border-radius:4px;margin-bottom:1rem;border-left:4px solid #e74c3c;">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/register">
            <div style="margin-bottom:1rem;">
                <label style="display:block;margin-bottom:.4rem;font-weight:600;color:#555;">Naam</label>
                <input type="text" name="username" required autofocus minlength="2"
                    style="width:100%;padding:.65rem .9rem;border:1px solid #ddd;border-radius:4px;font-size:1rem;"
                    placeholder="Voornaam Achternaam / Bedrijfsnaam">
            </div>
            <div style="margin-bottom:1rem;">
                <label style="display:block;margin-bottom:.4rem;font-weight:600;color:#555;">E-mailadres</label>
                <input type="email" name="email" required
                    style="width:100%;padding:.65rem .9rem;border:1px solid #ddd;border-radius:4px;font-size:1rem;">
            </div>
            <div style="margin-bottom:1rem;">
                <label style="display:block;margin-bottom:.4rem;font-weight:600;color:#555;">Wachtwoord</label>
                <input type="password" name="password" required minlength="8"
                    style="width:100%;padding:.65rem .9rem;border:1px solid #ddd;border-radius:4px;font-size:1rem;"
                    placeholder="Minimaal 8 tekens">
            </div>
            <div style="margin-bottom:1.5rem;">
                <label style="display:block;margin-bottom:.4rem;font-weight:600;color:#555;">Wachtwoord bevestigen</label>
                <input type="password" name="password_confirm" required minlength="8"
                    style="width:100%;padding:.65rem .9rem;border:1px solid #ddd;border-radius:4px;font-size:1rem;">
            </div>
            <button type="submit" class="btn" style="width:100%;padding:.75rem;font-size:1rem;">
                Account aanmaken
            </button>
        </form>

        <p style="text-align:center;margin-top:1.25rem;color:#777;">
            Al een account? <a href="/login" style="color:#3498db;">Inloggen</a>
        </p>
    </div>
</div>
{% endblock %}
